<!DOCTYPE html>
<html lang="de" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Task Radar | Helios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        helios: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            400: '#34d399',
                            500: '#10b981', 
                            600: '#059669', 
                            700: '#047857',
                        }
                    },
                    animation: {
                        'blob': 'blob 15s infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-red-glow': 'pulse-red-glow 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-soft': 'pulse-soft 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(50px, -50px) scale(1.2)' },
                            '66%': { transform: 'translate(-40px, 40px) scale(0.8)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(16, 185, 129, 0.1)', borderColor: 'rgba(255, 255, 255, 0.4)' },
                            '50%': { boxShadow: '0 0 25px rgba(16, 185, 129, 0.5)', borderColor: 'rgba(16, 185, 129, 0.7)' },
                        },
                        'pulse-red-glow': {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(239, 68, 68, 0.3)', borderColor: 'rgba(239, 68, 68, 0.4)', backgroundColor: 'rgba(239, 68, 68, 0.05)' },
                            '50%': { boxShadow: '0 0 35px rgba(239, 68, 68, 0.6)', borderColor: 'rgba(239, 68, 68, 0.9)', backgroundColor: 'rgba(239, 68, 68, 0.15)' },
                        },
                        'pulse-soft': {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.85' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Deep Liquid Glass Effects */
        .glass-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.2s ease;
        }
        .dark .glass-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        .dark .glass-input:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
        
        .dark .text-glow-green { text-shadow: 0 0 15px rgba(16, 185, 129, 0.7); }
        .dark .text-glow-red { text-shadow: 0 0 15px rgba(239, 68, 68, 0.7); }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Drag & Drop Styles */
        .task-item {
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }
        .task-dragging {
            opacity: 0.4;
            transform: scale(0.98);
        }
        .task-drag-over {
            border-top: 2px solid #10b981;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-fuchsia-50">

    <audio id="gongSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <!-- Massive Liquid Background Blobs -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-opacity duration-700 opacity-60 dark:opacity-40">
        <div class="absolute top-[-15%] left-[-10%] w-[40rem] h-[40rem] bg-helios-400 dark:bg-helios-500 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[120px] dark:blur-[140px] animate-blob"></div>
        <div class="absolute top-[10%] right-[-15%] w-[45rem] h-[45rem] bg-teal-300 dark:bg-teal-600 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[130px] dark:blur-[150px] animate-blob" style="animation-delay: 3s"></div>
        <div class="absolute bottom-[-25%] left-[15%] w-[50rem] h-[50rem] bg-emerald-200 dark:bg-cyan-900 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[140px] dark:blur-[160px] animate-blob" style="animation-delay: 6s"></div>
    </div>

    <!-- Header mit absoluter Zentrierung für die Uhr -->
    <header class="glass-panel z-20 p-4 flex justify-between items-center shrink-0 relative">
        <!-- Logo & Title (Left) -->
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 shrink-0 rounded-full bg-helios-100 dark:bg-helios-500/20 flex items-center justify-center border border-helios-300 dark:border-helios-400/50 shadow-sm dark:shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                <i class="fa-solid fa-heart-pulse text-helios-600 dark:text-helios-400 text-xl dark:text-glow-green"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white hidden md:flex items-center whitespace-nowrap">
                ER Task Radar <span class="text-helios-600 dark:text-helios-400 text-sm font-normal ml-3 tracking-widest uppercase">Helios Klinik Duisburg</span>
            </h1>
        </div>
        
        <!-- Clock & Weather (Absolute Center) -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center pointer-events-none">
            <div id="clock" class="text-3xl md:text-5xl font-bold font-mono text-helios-700 dark:text-white dark:text-glow-green tracking-tighter drop-shadow-md">00:00:00</div>
            <div class="flex items-center gap-3 mt-1">
                <div id="date" class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest drop-shadow-sm">Datum</div>
                <div class="w-1 h-1 rounded-full bg-slate-400 dark:bg-slate-500"></div>
                <!-- Weather Widget -->
                <div id="weather" class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest drop-shadow-sm flex items-center gap-1.5">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                </div>
            </div>
        </div>

        <!-- Controls (Right) -->
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white/50 dark:bg-slate-700/50 border border-white/60 dark:border-white/10 text-slate-600 dark:text-yellow-400 flex items-center justify-center hover:bg-white/80 dark:hover:bg-slate-600/80 transition backdrop-blur-md shadow-sm">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>

            <button onclick="clearAllData()" class="bg-white/50 dark:bg-slate-700/50 hover:bg-red-50 dark:hover:bg-red-900/40 border border-white/60 dark:border-white/10 text-slate-600 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-400 px-4 py-2 rounded-lg text-sm transition font-medium flex items-center gap-2 backdrop-blur-md shadow-sm">
                <i class="fa-solid fa-power-off"></i> <span class="hidden lg:inline">Shift Reset</span>
            </button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="flex-1 p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto align-top z-10 relative">
        
        <!-- Column 1: Timers -->
        <div class="flex flex-col gap-4 h-full">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full overflow-hidden">
                <div class="p-4 border-b border-white/40 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-transparent">
                    <h2 class="font-bold flex items-center gap-2 text-slate-800 dark:text-white drop-shadow-sm">
                        <i class="fa-solid fa-stopwatch text-helios-600 dark:text-helios-400"></i> Aktive Timer
                    </h2>
                </div>
                
                <!-- Quick Add Timer Form -->
                <div class="p-4 border-b border-white/40 dark:border-white/10 space-y-3 bg-white/10 dark:bg-white/5">
                    <input type="text" id="timerPatient" placeholder="Patient / Zimmer / Bett" class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                    
                    <input list="taskOptions" id="timerTask" placeholder="Was? (z.B. Labor, Re-Eval)" class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                    <datalist id="taskOptions">
                        <option value="Labor (allg.)">
                        <option value="Troponin">
                        <option value="CRP">
                        <option value="Abstriche">
                        <option value="Blutkulturen">
                        <option value="BGA">
                        <option value="Urin">
                        <option value="Analgesie Re-Eval">
                        <option value="EKG">
                        <option value="Arztinfo">
                    </datalist>
                    
                    <div class="flex gap-2">
                        <button onclick="addTimer(20)" class="flex-1 glass-input hover:bg-white/80 dark:hover:bg-helios-500/20 text-slate-700 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg transition font-bold shadow-sm">20m</button>
                        <button onclick="addTimer(45)" class="flex-1 glass-input hover:bg-white/80 dark:hover:bg-helios-500/20 text-slate-700 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg transition font-bold shadow-sm">45m</button>
                        <button onclick="addTimer(60)" class="flex-1 glass-input hover:bg-white/80 dark:hover:bg-helios-500/20 text-slate-700 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg transition font-bold shadow-sm">60m</button>
                        <input type="number" id="timerCustom" placeholder="Min" class="w-16 text-sm p-2 rounded-lg glass-input outline-none text-center text-slate-800 dark:text-white shadow-sm">
                        <button onclick="addCustomTimer()" class="bg-helios-600 hover:bg-helios-500 text-white dark:bg-helios-500/40 dark:hover:bg-helios-500/60 dark:border dark:border-helios-400/50 dark:text-white px-3 py-1 rounded-lg transition shadow-md dark:shadow-[0_0_15px_rgba(16,185,129,0.3)]"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Timer List -->
                <div id="timerList" class="p-4 overflow-y-auto flex-1 space-y-4 custom-scrollbar bg-white/5 dark:bg-transparent">
                    <!-- Timers injected here -->
                </div>
            </div>
        </div>

        <!-- Column 2: Transports -->
        <div class="flex flex-col gap-4 h-full">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full overflow-hidden">
                <div class="p-4 border-b border-white/40 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-transparent">
                    <h2 class="font-bold flex items-center gap-2 text-slate-800 dark:text-white drop-shadow-sm">
                        <i class="fa-solid fa-bed-pulse text-indigo-500 dark:text-indigo-400"></i> Transport Radar
                    </h2>
                </div>
                
                <div class="p-4 border-b border-white/40 dark:border-white/10 space-y-3 bg-white/10 dark:bg-white/5">
                    <input type="text" id="transPatient" placeholder="Patient / Zimmer" class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                    <div class="flex gap-2">
                        <input list="zielOptions" id="transZiel" placeholder="Ziel..." class="flex-1 w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white font-medium placeholder-slate-400 dark:placeholder-slate-500">
                        <datalist id="zielOptions">
                            <option value="Entlassung / Heim">
                            <option value="Rücktransport">
                            <option value="Verlegung Extern">
                            <option value="Verlegung Intern">
                            <option value="CT">
                            <option value="Röntgen">
                            <option value="Station">
                            <option value="OP">
                            <option value="Herzkatheter">
                        </datalist>

                        <input type="time" id="transTime" title="Ziel-Uhrzeit (leer = sofort)" class="w-26 text-sm p-2.5 rounded-lg glass-input outline-none text-center text-slate-800 dark:text-white">
                    </div>
                    <button onclick="addTransport()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white dark:bg-indigo-500/30 dark:hover:bg-indigo-500/50 dark:border dark:border-indigo-400/50 dark:text-white text-sm py-2.5 rounded-lg transition font-bold shadow-md dark:shadow-[0_0_15px_rgba(99,102,241,0.3)]"><i class="fa-solid fa-truck-medical mr-2"></i> Transport anlegen</button>
                </div>

                <div id="transportList" class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar bg-white/5 dark:bg-transparent">
                    <!-- Transports injected here -->
                </div>
            </div>
        </div>

        <!-- Column 3: Vitals Dropzone -->
        <div class="flex flex-col gap-4 h-full lg:col-span-1">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full overflow-hidden">
                <div class="p-4 border-b border-white/40 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-transparent">
                    <h2 class="font-bold flex items-center gap-2 text-slate-800 dark:text-white drop-shadow-sm">
                        <i class="fa-solid fa-heartbeat text-pink-500 dark:text-pink-400"></i> Vital Zwischenablage
                    </h2>
                </div>
                
                <div class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar bg-white/5 dark:bg-transparent">
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">Patienten Info optional</label>
                        <input type="text" id="vitPatient" placeholder="Name oder Raum" class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400">
                    </div>
                    
                    <div>
                        <label class="text-xs font-bold text-red-500 dark:text-red-400 mb-1.5 block uppercase tracking-widest drop-shadow-sm"><i class="fa-solid fa-triangle-exclamation"></i> Allergien</label>
                        <input type="text" id="vitAllergies" placeholder="Keine bekannt / Penicillin..." class="w-full text-sm p-2.5 rounded-lg bg-red-50/50 dark:bg-red-900/20 border border-red-300 dark:border-red-500/40 focus:border-red-500 outline-none text-slate-800 dark:text-white backdrop-blur-md shadow-sm transition placeholder-red-300 dark:placeholder-red-400/50">
                        <div class="flex flex-wrap gap-1.5 mt-2">
                            <button onclick="addAllergy('Penicillin')" class="text-[10px] font-bold bg-white/60 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-1 rounded border border-red-200 dark:border-red-500/30 hover:bg-white dark:hover:bg-red-900/60 transition backdrop-blur-sm shadow-sm">Penicillin</button>
                            <button onclick="addAllergy('Novalgin')" class="text-[10px] font-bold bg-white/60 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-1 rounded border border-red-200 dark:border-red-500/30 hover:bg-white dark:hover:bg-red-900/60 transition backdrop-blur-sm shadow-sm">Novalgin</button>
                            <button onclick="addAllergy('Pflaster')" class="text-[10px] font-bold bg-white/60 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-1 rounded border border-red-200 dark:border-red-500/30 hover:bg-white dark:hover:bg-red-900/60 transition backdrop-blur-sm shadow-sm">Pflaster</button>
                            <button onclick="addAllergy('KM')" class="text-[10px] font-bold bg-white/60 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-1 rounded border border-red-200 dark:border-red-500/30 hover:bg-white dark:hover:bg-red-900/60 transition backdrop-blur-sm shadow-sm">KM</button>
                            <button onclick="setAllergy('Keine bekannt')" class="text-[10px] font-bold bg-emerald-100/60 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 px-2 py-1 rounded border border-emerald-200 dark:border-emerald-500/30 hover:bg-emerald-100 dark:hover:bg-emerald-900/60 transition backdrop-blur-sm shadow-sm">Keine</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">RR mmHg</label>
                            <input type="text" id="vitRR" placeholder="120/80" class="w-full text-base font-mono p-2.5 rounded-lg glass-input outline-none text-center text-helios-700 dark:text-helios-400 placeholder-slate-300 dark:placeholder-slate-600 font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">HF /min</label>
                            <input type="number" id="vitHF" placeholder="80" class="w-full text-base font-mono p-2.5 rounded-lg glass-input outline-none text-center text-helios-700 dark:text-helios-400 placeholder-slate-300 dark:placeholder-slate-600 font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">AF /min</label>
                            <input type="number" id="vitAF" placeholder="15" class="w-full text-base font-mono p-2.5 rounded-lg glass-input outline-none text-center text-helios-700 dark:text-helios-400 placeholder-slate-300 dark:placeholder-slate-600 font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">SpO2 %</label>
                            <input type="number" id="vitSpO2" placeholder="98" class="w-full text-base font-mono p-2.5 rounded-lg glass-input outline-none text-center text-helios-700 dark:text-helios-400 placeholder-slate-300 dark:placeholder-slate-600 font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">Temp °C</label>
                            <input type="number" step="0.1" id="vitTemp" placeholder="37.0" class="w-full text-base font-mono p-2.5 rounded-lg glass-input outline-none text-center text-helios-700 dark:text-helios-400 placeholder-slate-300 dark:placeholder-slate-600 font-bold">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block tracking-wide">GCS / BZ / Sonstiges</label>
                        <input type="text" id="vitMisc" placeholder="BZ 120, GCS 15..." class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400">
                    </div>
                    
                    <div class="pt-2 flex gap-3">
                        <button onclick="copyVitals()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white dark:bg-white/10 dark:hover:bg-white/20 dark:border dark:border-white/30 py-2.5 rounded-lg transition font-bold text-sm flex justify-center items-center gap-2 shadow-md backdrop-blur-md">
                            <i class="fa-regular fa-copy"></i> Kopieren
                        </button>
                        <button onclick="clearVitals()" class="glass-input hover:bg-red-50 dark:hover:bg-red-900/40 text-slate-700 hover:text-red-600 dark:text-red-400 px-4 py-2.5 rounded-lg transition shadow-sm">
                            <i class="fa-solid fa-eraser"></i>
                        </button>
                    </div>
                    <div id="copyToast" class="hidden text-center text-xs font-bold text-helios-700 bg-helios-100/80 border border-helios-300 dark:text-helios-300 dark:bg-helios-500/20 dark:border-helios-400/50 p-2.5 rounded-lg mt-2 backdrop-blur-md shadow-lg">Kopiert für Orbis!</div>
                </div>
            </div>
        </div>

        <!-- Column 4: Task List -->
        <div class="flex flex-col gap-4 h-full lg:col-span-1">
            <div class="glass-panel rounded-2xl flex flex-col h-full overflow-hidden">
                <div class="p-4 border-b border-white/40 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-transparent">
                    <h2 class="font-bold flex items-center gap-2 text-slate-800 dark:text-white drop-shadow-sm">
                        <i class="fa-solid fa-list-check text-amber-500 dark:text-amber-400"></i> Checkliste
                    </h2>
                    <span class="text-[10px] text-slate-600 dark:text-slate-300 font-bold uppercase tracking-widest bg-white/40 dark:bg-white/10 px-2 py-1 rounded backdrop-blur-sm border border-white/50 dark:border-white/10">Auto Save</span>
                </div>
                <div class="p-4 flex-1 flex flex-col overflow-hidden bg-white/5 dark:bg-transparent">
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newTaskInput" placeholder="Neue Aufgabe..." class="w-full text-sm p-2.5 rounded-lg glass-input outline-none text-slate-800 dark:text-white placeholder-slate-400" onkeypress="if(event.key === 'Enter') addTask()">
                        <button onclick="addTask()" class="bg-amber-500 hover:bg-amber-400 text-white dark:bg-amber-500/40 dark:hover:bg-amber-500/60 dark:border dark:border-amber-400/50 px-4 rounded-lg transition font-bold shadow-md dark:shadow-[0_0_15px_rgba(245,158,11,0.2)]"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="taskList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1 mb-2 pb-4">
                        <!-- Tasks injected here -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // State Management
        let appData = {
            timers: [],
            transports: [],
            tasks: [] 
        };

        // Audio Setup for Gong - Fix for Autoplay Policies
        let audioUnlocked = false;

        function playGong() {
            const gong = document.getElementById('gongSound');
            if(gong) {
                gong.volume = 1.0;
                gong.play().catch(err => {
                    console.log("Audio Playback immer noch blockiert. Bitte irgendwo ins Dashboard klicken.", err);
                });
            }
        }

        // Entriegelt das Audio Element beim ersten Klick im Dashboard
        document.body.addEventListener('click', function unlockAudio() {
            if(!audioUnlocked) {
                const gong = document.getElementById('gongSound');
                if(gong) {
                    gong.volume = 0; // Stumm abspielen
                    gong.play().then(() => {
                        gong.pause();
                        gong.currentTime = 0;
                        audioUnlocked = true;
                    }).catch(e => console.log("Warte auf stärkere Interaktion für Audio Unlock."));
                }
            }
        }, { once: true });

        // Theme Toggle Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Live Weather via Open-Meteo API (Koordinaten: Duisburg)
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.4324&longitude=6.7651&current=temperature_2m,weather_code');
                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                let iconClass = 'fa-sun text-yellow-500 dark:text-yellow-400'; 
                if (code === 0) iconClass = 'fa-sun text-yellow-500 dark:text-yellow-400';
                else if (code >= 1 && code <= 3) iconClass = 'fa-cloud-sun text-slate-400 dark:text-slate-300';
                else if (code >= 45 && code <= 48) iconClass = 'fa-smog text-slate-400 dark:text-slate-300';
                else if (code >= 51 && code <= 67) iconClass = 'fa-cloud-rain text-blue-500 dark:text-blue-400';
                else if (code >= 71 && code <= 77) iconClass = 'fa-snowflake text-sky-400 dark:text-sky-300';
                else if (code >= 80 && code <= 82) iconClass = 'fa-cloud-showers-heavy text-blue-600 dark:text-blue-500';
                else if (code >= 95 && code <= 99) iconClass = 'fa-cloud-bolt text-purple-600 dark:text-purple-400';

                document.getElementById('weather').innerHTML = `<i class="fa-solid ${iconClass}"></i> ${temp}°C`;
            } catch (err) {
                console.log('Wetterabruf fehlgeschlagen', err);
                document.getElementById('weather').innerHTML = `<i class="fa-solid fa-cloud"></i> --°C`;
            }
        }

        // Init & Loop
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            startClock();
            fetchWeather();
            setInterval(fetchWeather, 1800000); 
            setInterval(updateAllTimers, 1000);
        });

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE');
                document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }, 1000);
        }

        // Data Persistence
        function saveData() {
            localStorage.setItem('erTaskRadar', JSON.stringify(appData));
        }

        function loadData() {
            const saved = localStorage.getItem('erTaskRadar');
            if (saved) {
                const parsed = JSON.parse(saved);
                appData.timers = parsed.timers || [];
                appData.transports = parsed.transports || [];
                appData.tasks = parsed.tasks || [];

                renderTimers();
                renderTransports();
                renderTasks();
            }
        }

        function clearAllData() {
            if(confirm('Achtung: Willst du wirklich alle Daten dieser Schicht löschen?')) {
                appData = { timers: [], transports: [], tasks: [] };
                clearVitals();
                saveData();
                renderTimers();
                renderTransports();
                renderTasks();
            }
        }

        // Master Timer Loop
        function updateAllTimers() {
            let needsRender = false;
            const now = Date.now();
            
            // Timers Logic
            appData.timers.forEach(timer => {
                const elapsed = now - timer.startTime;
                const wasOverdue = timer.isOverdue;
                timer.isOverdue = elapsed >= timer.durationMs;
                
                if (timer.isOverdue !== wasOverdue) {
                    needsRender = true;
                    if (timer.isOverdue) {
                        playGong();
                    }
                }
            });
            
            if (needsRender) {
                saveData();
                renderTimers();
            } else {
                updateTimerDisplays(now);
            }
        }

        function formatTimeDiff(ms) {
            const totalSeconds = Math.floor(Math.abs(ms) / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Feature: Timers
        function addTimer(minutes) {
            const patient = document.getElementById('timerPatient').value || "Unbekannt";
            const task = document.getElementById('timerTask').value || "Labor / Warten";
            
            const newTimer = {
                id: Date.now(),
                patient: patient,
                task: task,
                startTime: Date.now(),
                durationMs: minutes * 60 * 1000,
                isOverdue: false
            };
            
            appData.timers.push(newTimer);
            saveData();
            renderTimers();
            
            document.getElementById('timerPatient').value = "";
            document.getElementById('timerTask').value = "";
            document.getElementById('timerPatient').focus();
        }

        function addCustomTimer() {
            const mins = parseInt(document.getElementById('timerCustom').value);
            if(mins > 0) {
                addTimer(mins);
                document.getElementById('timerCustom').value = "";
            }
        }

        function deleteTimer(id) {
            appData.timers = appData.timers.filter(t => t.id !== id);
            saveData();
            renderTimers();
        }

        function renderTimers() {
            const list = document.getElementById('timerList');
            list.innerHTML = '';
            
            if(appData.timers.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-400 text-sm py-8 font-mono font-bold">Keine aktiven Timer</div>';
                return;
            }

            const sortedTimers = [...appData.timers].sort((a, b) => {
                if (a.isOverdue && !b.isOverdue) return -1;
                if (!a.isOverdue && b.isOverdue) return 1;
                const aRemaining = a.durationMs - (Date.now() - a.startTime);
                const bRemaining = b.durationMs - (Date.now() - b.startTime);
                return aRemaining - bRemaining;
            });

            sortedTimers.forEach(timer => {
                const el = document.createElement('div');
                
                const baseClasses = "p-4 rounded-xl relative transition-all duration-300 overflow-hidden shadow-sm backdrop-blur-md border";
                const stateClasses = timer.isOverdue 
                    ? "bg-red-100/60 border-red-300 dark:bg-red-900/40 dark:border-red-500/60 animate-pulse-red-glow" 
                    : "bg-white/60 border-white/80 dark:bg-slate-800/60 dark:border-white/20 dark:animate-pulse-glow";
                
                el.className = `${baseClasses} ${stateClasses}`;
                
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-2 relative z-10">
                        <div>
                            <div class="font-bold text-sm text-slate-900 dark:text-white drop-shadow-sm">${timer.patient}</div>
                            <div class="text-xs font-bold text-helios-700 dark:text-helios-400 mt-0.5 uppercase tracking-wide">${timer.task}</div>
                        </div>
                        <button onclick="deleteTimer(${timer.id})" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/50 dark:hover:bg-white/20"><i class="fa-solid fa-times"></i></button>
                    </div>
                    
                    <div class="flex justify-between items-end mt-4 relative z-10">
                        <div class="text-xs font-mono font-bold px-2 py-1 rounded bg-white/60 text-slate-700 border border-white/80 dark:bg-black/40 dark:text-slate-200 dark:border-white/10 shadow-sm">
                            Ziel: ${timer.durationMs / 60000}m
                        </div>
                        <div class="font-mono font-bold text-3xl tracking-wider timer-display drop-shadow-sm ${timer.isOverdue ? 'text-red-700 dark:text-red-400 dark:text-glow-red' : 'text-helios-700 dark:text-helios-400 dark:text-glow-green'}" data-id="${timer.id}">
                            --:--
                        </div>
                    </div>
                    
                    ${!timer.isOverdue ? `
                    <div class="absolute bottom-0 left-0 h-1.5 bg-slate-200/50 dark:bg-helios-900/50 w-full">
                        <div class="bg-helios-500 dark:bg-helios-400 h-full progress-bar shadow-[0_0_10px_rgba(16,185,129,0.8)] transition-all duration-1000 ease-linear" data-id="${timer.id}" style="width: 0%;"></div>
                    </div>` : `
                    <div class="absolute bottom-0 left-0 h-1.5 bg-red-500 w-full shadow-[0_0_15px_rgba(239,68,68,1)]"></div>
                    `}
                `;
                list.appendChild(el);
            });
            updateTimerDisplays(Date.now());
        }

        function updateTimerDisplays(now) {
            // Update Active Timers
            appData.timers.forEach(timer => {
                const display = document.querySelector(`.timer-display[data-id="${timer.id}"]`);
                const progress = document.querySelector(`.progress-bar[data-id="${timer.id}"]`);
                
                if(display) {
                    const elapsed = now - timer.startTime;
                    const diff = timer.durationMs - elapsed;
                    
                    if(diff <= 0) {
                        display.innerText = "+" + formatTimeDiff(Math.abs(diff));
                    } else {
                        display.innerText = formatTimeDiff(diff);
                        if(progress) {
                            const percent = (elapsed / timer.durationMs) * 100;
                            progress.style.width = `${percent}%`;
                        }
                    }
                }
            });

            // Update Transport Timers & Bars
            appData.transports.forEach(t => {
                if (t.status === 'done') return;
                
                const display = document.querySelector(`.trans-timer-display[data-id="${t.id}"]`);
                const progress = document.querySelector(`.trans-progress-bar[data-id="${t.id}"]`);

                if(display) {
                    if (t.isAsap) {
                        const elapsed = now - t.targetMs;
                        display.innerText = "+" + formatTimeDiff(elapsed);
                        display.classList.add('text-red-600', 'dark:text-red-400');
                        
                        // Fake progress bar filling up over 30 mins to show urgency for ASAP
                        if(progress) {
                            const percent = Math.min((elapsed / 1800000) * 100, 100); 
                            progress.style.width = `${percent}%`;
                        }
                    } else {
                        const diff = t.targetMs - now;
                        if(diff <= 0) {
                            display.innerText = "+" + formatTimeDiff(Math.abs(diff));
                            display.classList.add('text-red-600', 'dark:text-red-400');
                            display.classList.remove('text-indigo-700', 'dark:text-indigo-400');
                            if(progress) progress.style.width = '100%';
                        } else {
                            display.innerText = formatTimeDiff(diff);
                            display.classList.remove('text-red-600', 'dark:text-red-400');
                            display.classList.add('text-indigo-700', 'dark:text-indigo-400');
                            
                            // Real progress bar calculation based on start and target
                            if(progress) {
                                const total = t.targetMs - t.id; // t.id is creation timestamp
                                const elapsed = now - t.id;
                                const percent = Math.min(Math.max((elapsed / total) * 100, 0), 100);
                                progress.style.width = `${percent}%`;
                            }
                        }
                    }
                }
            });
        }

        // Feature: Transports
        function addTransport() {
            const patient = document.getElementById('transPatient').value;
            const ziel = document.getElementById('transZiel').value;
            const timeInput = document.getElementById('transTime').value;

            if(!patient || !ziel) {
                alert("Patient und Ziel müssen ausgefüllt sein.");
                return;
            }

            let targetMs = 0;
            let isAsap = false;

            if(timeInput) {
                const [hours, mins] = timeInput.split(':');
                const d = new Date();
                d.setHours(parseInt(hours), parseInt(mins), 0, 0);
                targetMs = d.getTime();
            } else {
                targetMs = Date.now();
                isAsap = true;
            }

            const newTrans = {
                id: Date.now(),
                patient: patient,
                ziel: ziel,
                timeString: timeInput || "ASAP",
                targetMs: targetMs,
                isAsap: isAsap,
                status: "waiting" 
            };

            appData.transports.push(newTrans);
            saveData();
            renderTransports();
            
            document.getElementById('transPatient').value = "";
            document.getElementById('transZiel').value = "";
            document.getElementById('transTime').value = "";
        }

        function updateTransportStatus(id, newStatus) {
            const t = appData.transports.find(x => x.id === id);
            if(t) {
                t.status = newStatus;
                saveData();
                renderTransports();
            }
        }

        function deleteTransport(id) {
            appData.transports = appData.transports.filter(t => t.id !== id);
            saveData();
            renderTransports();
        }

        function renderTransports() {
            const list = document.getElementById('transportList');
            list.innerHTML = '';
            
            if(appData.transports.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-400 text-sm py-8 font-mono font-bold">Keine Transporte disponiert</div>';
                return;
            }

            appData.transports.forEach(t => {
                let statusColor = "bg-white/60 border-white/80 text-slate-800 dark:bg-slate-800/60 dark:border-white/20 dark:text-slate-200";
                let badgeColor = "bg-white/80 text-slate-700 border-slate-300 dark:bg-black/40 dark:text-slate-300 dark:border-white/10";
                let pulseClass = t.status !== 'done' ? "animate-pulse-soft" : "";
                
                if(t.status === 'progress') { 
                    statusColor = "bg-amber-100/60 border-amber-300 text-amber-900 dark:bg-amber-900/40 dark:border-amber-500/50 dark:text-amber-100 shadow-[0_0_15px_rgba(245,158,11,0.2)]"; 
                    badgeColor = "bg-amber-200/80 text-amber-800 border-amber-400 dark:bg-amber-800/60 dark:text-amber-200 dark:border-amber-400/50";
                }
                if(t.status === 'done') { 
                    statusColor = "bg-helios-100/50 border-helios-300 text-helios-900 opacity-70 dark:bg-helios-900/30 dark:border-helios-500/30 dark:text-helios-100 dark:opacity-60"; 
                    badgeColor = "bg-helios-200/80 text-helios-800 border-helios-400 dark:bg-helios-800/50 dark:text-helios-300 dark:border-helios-500/50";
                }

                const el = document.createElement('div');
                el.className = `p-3 rounded-xl border flex flex-col gap-2 transition-all duration-300 shadow-sm backdrop-blur-md relative overflow-hidden ${statusColor} ${pulseClass}`;
                
                const timerHtml = t.status !== 'done' 
                    ? `<div class="font-mono text-sm font-bold trans-timer-display drop-shadow-sm" data-id="${t.id}">--:--</div>` 
                    : `<div class="font-mono text-sm font-bold text-slate-500 dark:text-slate-400">Erledigt</div>`;

                // Calculate Progress Bar DOM
                let progressBarHtml = '';
                if (t.status !== 'done') {
                    if (!t.isAsap) {
                        progressBarHtml = `
                            <div class="absolute bottom-0 left-0 h-1.5 bg-slate-200/50 dark:bg-indigo-900/50 w-full rounded-b-xl overflow-hidden">
                                <div class="bg-indigo-500 dark:bg-indigo-400 h-full trans-progress-bar shadow-[0_0_10px_rgba(99,102,241,0.8)] transition-all duration-1000 ease-linear" data-id="${t.id}" style="width: 0%;"></div>
                            </div>
                        `;
                    } else {
                        progressBarHtml = `
                            <div class="absolute bottom-0 left-0 h-1.5 bg-slate-200/50 dark:bg-red-900/50 w-full rounded-b-xl overflow-hidden">
                                <div class="bg-red-500 dark:bg-red-400 h-full trans-progress-bar shadow-[0_0_10px_rgba(239,68,68,0.8)] transition-all duration-1000 ease-linear" data-id="${t.id}" style="width: 0%;"></div>
                            </div>
                        `;
                    }
                }

                el.innerHTML = `
                    <div class="flex justify-between items-start relative z-10">
                        <div class="font-bold text-sm drop-shadow-sm">${t.patient}</div>
                        <div class="flex items-center gap-2">
                            ${timerHtml}
                            <div class="font-mono text-xs font-bold px-2 py-0.5 rounded border shadow-sm ${badgeColor}">${t.timeString}</div>
                        </div>
                    </div>
                    <div class="text-sm font-bold opacity-90 mt-1 relative z-10"><i class="fa-solid fa-location-dot mr-1.5"></i> ${t.ziel}</div>
                    
                    <div class="flex justify-between items-center mt-2 pt-3 border-t border-black/10 dark:border-white/10 relative z-10">
                        <div class="flex gap-1">
                            ${t.status !== 'progress' ? `<button onclick="updateTransportStatus(${t.id}, 'progress')" class="text-xs w-8 h-8 rounded-lg bg-amber-200/60 hover:bg-amber-300 border border-amber-300 text-amber-700 dark:bg-amber-500/30 dark:hover:bg-amber-500/50 dark:border-amber-500/40 dark:text-amber-300 transition shadow-sm" title="Unterwegs"><i class="fa-solid fa-person-walking-arrow-right"></i></button>` : ''}
                            ${t.status !== 'done' ? `<button onclick="updateTransportStatus(${t.id}, 'done')" class="text-xs w-8 h-8 rounded-lg bg-helios-200/60 hover:bg-helios-300 border border-helios-300 text-helios-700 dark:bg-helios-500/30 dark:hover:bg-helios-500/50 dark:border-helios-500/40 dark:text-helios-300 transition shadow-sm" title="Erledigt"><i class="fa-solid fa-check"></i></button>` : ''}
                        </div>
                        <button onclick="deleteTransport(${t.id})" class="text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 transition w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/50 dark:hover:bg-white/10"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    ${progressBarHtml}
                `;
                list.appendChild(el);
            });
            updateTimerDisplays(Date.now());
        }

        // Feature: Vitals & Allergies
        function addAllergy(val) {
            const input = document.getElementById('vitAllergies');
            let current = input.value.trim();
            if (current === 'Keine bekannt' || current === '') {
                input.value = val;
            } else {
                if (!current.includes(val)) {
                    input.value = current + ', ' + val;
                }
            }
        }

        function setAllergy(val) {
            document.getElementById('vitAllergies').value = val;
        }

        function copyVitals() {
            const pat = document.getElementById('vitPatient').value;
            const alg = document.getElementById('vitAllergies').value;
            const rr = document.getElementById('vitRR').value;
            const hf = document.getElementById('vitHF').value;
            const af = document.getElementById('vitAF').value;
            const spo2 = document.getElementById('vitSpO2').value;
            const temp = document.getElementById('vitTemp').value;
            const misc = document.getElementById('vitMisc').value;

            let text = "VITALWERTE:\n";
            if(pat) text += `Patient: ${pat}\n`;
            if(alg) text += `ALLERGIEN: ${alg.toUpperCase()}\n`;
            if(rr) text += `RR: ${rr} mmHg\n`;
            if(hf) text += `HF: ${hf} /min\n`;
            if(af) text += `AF: ${af} /min\n`;
            if(spo2) text += `SpO2: ${spo2} %\n`;
            if(temp) text += `Temp: ${temp} °C\n`;
            if(misc) text += `Zusatz: ${misc}\n`;
            text += `Erfasst um: ${new Date().toLocaleTimeString('de-DE').substring(0,5)} Uhr`;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2500);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const toast = document.getElementById('copyToast');
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 2500);
                } catch (err) {
                    console.error('Fallback failed', err);
                }
                document.body.removeChild(textArea);
            });
        }

        function clearVitals() {
            document.getElementById('vitPatient').value = '';
            document.getElementById('vitAllergies').value = '';
            document.getElementById('vitRR').value = '';
            document.getElementById('vitHF').value = '';
            document.getElementById('vitAF').value = '';
            document.getElementById('vitSpO2').value = '';
            document.getElementById('vitTemp').value = '';
            document.getElementById('vitMisc').value = '';
        }

        // Feature: Task List with Drag & Drop
        let draggedTaskId = null;

        function addTask() {
            const input = document.getElementById('newTaskInput');
            const text = input.value.trim();
            if(!text) return;

            appData.tasks.unshift({
                id: Date.now(),
                text: text,
                done: false
            });

            input.value = '';
            saveData();
            renderTasks();
        }

        function toggleTask(id) {
            const index = appData.tasks.findIndex(t => t.id === id);
            if(index !== -1) {
                const task = appData.tasks[index];
                task.done = !task.done;
                
                appData.tasks.splice(index, 1);
                if (task.done) {
                    appData.tasks.push(task);
                } else {
                    appData.tasks.unshift(task);
                }
                
                saveData();
                renderTasks();
            }
        }

        function deleteTask(id) {
            appData.tasks = appData.tasks.filter(t => t.id !== id);
            saveData();
            renderTasks();
        }

        // Drag and Drop Handlers
        function handleDragStart(e) {
            draggedTaskId = Number(this.dataset.id);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.id);
            setTimeout(() => this.classList.add('task-dragging'), 0);
        }

        function handleDragOver(e) {
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            if (Number(this.dataset.id) !== draggedTaskId) {
                this.classList.add('task-drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('task-drag-over');
        }

        function handleDrop(e) {
            e.stopPropagation();
            this.classList.remove('task-drag-over');
            
            const dropTargetId = Number(this.dataset.id);
            
            if (draggedTaskId && draggedTaskId !== dropTargetId) {
                const draggedIdx = appData.tasks.findIndex(t => t.id === draggedTaskId);
                const targetIdx = appData.tasks.findIndex(t => t.id === dropTargetId);
                
                if (draggedIdx !== -1 && targetIdx !== -1) {
                    const [removedItem] = appData.tasks.splice(draggedIdx, 1);
                    appData.tasks.splice(targetIdx, 0, removedItem);
                    saveData();
                    renderTasks();
                }
            }
            return false;
        }

        function handleDragEnd(e) {
            this.classList.remove('task-dragging');
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('task-drag-over'));
            draggedTaskId = null;
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            if(appData.tasks.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-400 text-sm py-4 font-mono font-bold">Keine Aufgaben</div>';
                return;
            }

            appData.tasks.forEach(task => {
                const el = document.createElement('div');
                const textStyle = task.done 
                    ? "line-through text-slate-500 dark:text-slate-500" 
                    : "text-slate-800 dark:text-slate-100 font-medium";
                const bgStyle = task.done 
                    ? "bg-white/30 dark:bg-white/5 opacity-60 border-white/40 dark:border-white/10" 
                    : "bg-white/70 dark:bg-slate-800/60 border-white/80 dark:border-white/20 shadow-sm cursor-grab active:cursor-grabbing backdrop-blur-md";
                const checkIcon = task.done 
                    ? "<i class='fa-solid fa-circle-check text-helios-600 dark:text-helios-400'></i>" 
                    : "<i class='fa-regular fa-circle text-slate-400 dark:text-slate-400'></i>";

                el.className = `task-item flex items-center gap-3 p-3 rounded-lg border ${bgStyle}`;
                el.dataset.id = task.id;
                
                if (!task.done) {
                    el.draggable = true;
                    el.addEventListener('dragstart', handleDragStart);
                    el.addEventListener('dragover', handleDragOver);
                    el.addEventListener('dragenter', handleDragEnter);
                    el.addEventListener('dragleave', handleDragLeave);
                    el.addEventListener('drop', handleDrop);
                    el.addEventListener('dragend', handleDragEnd);
                }

                el.innerHTML = `
                    ${!task.done ? `<div class="text-slate-400 dark:text-slate-500 cursor-grab hover:text-slate-600 transition"><i class="fa-solid fa-grip-vertical"></i></div>` : `<div class="w-2"></div>`}
                    <button onclick="toggleTask(${task.id})" class="text-xl flex-shrink-0 hover:scale-110 transition-transform drop-shadow-sm">
                        ${checkIcon}
                    </button>
                    <span class="flex-1 text-sm ${textStyle} transition-all drop-shadow-sm">${task.text}</span>
                    <button onclick="deleteTask(${task.id})" class="text-slate-400 hover:text-red-600 dark:text-slate-500 dark:hover:text-red-400 flex-shrink-0 transition-colors rounded hover:bg-white/50 dark:hover:bg-white/10 p-1">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                list.appendChild(el);
            });
        }

    </script>
</body>
</html>
