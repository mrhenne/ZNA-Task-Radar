<!DOCTYPE html>
<html lang="de" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Task Radar | Helios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // Check local storage for theme preference before rendering to prevent flashing
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        helios: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            400: '#34d399',
                            500: '#10b981', /* Emerald 500 */
                            600: '#059669', /* Emerald 600 */
                            700: '#047857',
                        }
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-red-glow': 'pulse-red-glow 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(16, 185, 129, 0.1)', borderColor: 'rgba(16, 185, 129, 0.2)' },
                            '50%': { boxShadow: '0 0 20px rgba(16, 185, 129, 0.4)', borderColor: 'rgba(16, 185, 129, 0.6)' },
                        },
                        'pulse-red-glow': {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(239, 68, 68, 0.2)', borderColor: 'rgba(239, 68, 68, 0.3)', backgroundColor: 'rgba(239, 68, 68, 0.05)' },
                            '50%': { boxShadow: '0 0 25px rgba(239, 68, 68, 0.5)', borderColor: 'rgba(239, 68, 68, 0.8)', backgroundColor: 'rgba(239, 68, 68, 0.1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
        
        /* Neon text */
        .dark .text-glow-green { text-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
        .dark .text-glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.6); }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-fuchsia-50">

    <!-- Liquid Background Blobs -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-opacity duration-500 opacity-40 dark:opacity-30">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-helios-400 dark:bg-helios-500 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] dark:blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[30rem] h-[30rem] bg-teal-300 dark:bg-teal-600 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] dark:blur-[120px] animate-blob" style="animation-delay: 2s"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[40rem] h-[40rem] bg-emerald-200 dark:bg-cyan-900 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[120px] dark:blur-[130px] animate-blob" style="animation-delay: 4s"></div>
    </div>

    <!-- Header -->
    <header class="glass-panel z-10 p-4 flex justify-between items-center shrink-0 bg-white/70 border-b border-slate-200 dark:bg-slate-800/40 dark:border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-helios-100 dark:bg-helios-500/20 flex items-center justify-center border border-helios-200 dark:border-helios-400/50 shadow-sm dark:shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                <i class="fa-solid fa-heart-pulse text-helios-600 dark:text-helios-400 text-xl dark:text-glow-green"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white">ER Task Radar <span class="text-helios-600 dark:text-helios-400 text-sm font-normal ml-2 tracking-widest uppercase">Helios DU</span></h1>
        </div>
        <div class="flex items-center gap-4 md:gap-6">
            <div class="text-right hidden sm:block">
                <div id="clock" class="text-2xl font-bold font-mono text-helios-700 dark:text-white dark:text-glow-green">00:00:00</div>
                <div id="date" class="text-xs text-slate-500 dark:text-slate-400">Datum</div>
            </div>
            
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-yellow-400 flex items-center justify-center hover:bg-slate-300 dark:hover:bg-slate-600 transition">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>

            <button onclick="clearAllData()" class="bg-red-100 dark:bg-red-500/20 hover:bg-red-200 dark:hover:bg-red-500/40 border border-red-200 dark:border-red-500/50 text-red-600 dark:text-red-400 px-3 md:px-4 py-2 rounded-lg text-sm transition font-medium flex items-center gap-2 dark:hover:shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                <i class="fa-solid fa-power-off"></i> <span class="hidden md:inline">Shift Reset</span>
            </button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="flex-1 p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto align-top z-10 relative">
        
        <!-- Column 1: Timers -->
        <div class="flex flex-col gap-4 h-full">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full bg-white/70 border border-slate-200 dark:bg-slate-800/40 dark:border-white/10">
                <div class="p-4 border-b border-slate-200 dark:border-white/10 flex justify-between items-center">
                    <h2 class="font-semibold flex items-center gap-2 text-slate-800 dark:text-white">
                        <i class="fa-solid fa-stopwatch text-helios-600 dark:text-helios-400"></i> Aktive Timer
                    </h2>
                </div>
                
                <!-- Quick Add Timer Form -->
                <div class="p-4 border-b border-slate-200 dark:border-white/10 space-y-3 bg-slate-50/50 dark:bg-white/5">
                    <input type="text" id="timerPatient" placeholder="Patient / Zimmer / Bett" class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-helios-500 focus:ring-1 focus:ring-helios-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white dark:focus:border-helios-400 transition">
                    <input type="text" id="timerTask" placeholder="Was? (z.B. Labor, Re-Eval)" class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-helios-500 focus:ring-1 focus:ring-helios-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white dark:focus:border-helios-400 transition">
                    <div class="flex gap-2">
                        <button onclick="addTimer(20)" class="flex-1 bg-white dark:bg-white/5 hover:bg-helios-50 dark:hover:bg-helios-500/20 text-slate-600 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg border border-slate-200 dark:border-white/10 transition font-medium">20m</button>
                        <button onclick="addTimer(45)" class="flex-1 bg-white dark:bg-white/5 hover:bg-helios-50 dark:hover:bg-helios-500/20 text-slate-600 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg border border-slate-200 dark:border-white/10 transition font-medium">45m</button>
                        <button onclick="addTimer(60)" class="flex-1 bg-white dark:bg-white/5 hover:bg-helios-50 dark:hover:bg-helios-500/20 text-slate-600 dark:text-slate-300 hover:text-helios-700 dark:hover:text-white text-xs py-2 rounded-lg border border-slate-200 dark:border-white/10 transition font-medium">60m</button>
                        <input type="number" id="timerCustom" placeholder="Min" class="w-16 text-sm p-2 rounded-lg bg-white border border-slate-200 outline-none text-center dark:bg-slate-900/60 dark:border-white/10 dark:text-white">
                        <button onclick="addCustomTimer()" class="bg-helios-600 hover:bg-helios-700 text-white dark:bg-helios-500/30 dark:hover:bg-helios-500/50 dark:border dark:border-helios-400 dark:text-helios-400 dark:hover:text-white px-3 py-1 rounded-lg transition shadow-sm dark:shadow-[0_0_10px_rgba(16,185,129,0.2)]"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Timer List -->
                <div id="timerList" class="p-4 overflow-y-auto flex-1 space-y-4 custom-scrollbar">
                    <!-- Timers injected here -->
                </div>
            </div>
        </div>

        <!-- Column 2: Transports -->
        <div class="flex flex-col gap-4 h-full">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full bg-white/70 border border-slate-200 dark:bg-slate-800/40 dark:border-white/10">
                <div class="p-4 border-b border-slate-200 dark:border-white/10 flex justify-between items-center">
                    <h2 class="font-semibold flex items-center gap-2 text-slate-800 dark:text-white">
                        <i class="fa-solid fa-bed-pulse text-indigo-500 dark:text-indigo-400"></i> Transport Radar
                    </h2>
                </div>
                
                <div class="p-4 border-b border-slate-200 dark:border-white/10 space-y-3 bg-slate-50/50 dark:bg-white/5">
                    <input type="text" id="transPatient" placeholder="Patient / Zimmer" class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white transition">
                    <div class="flex gap-2">
                        <select id="transZiel" class="flex-1 text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none appearance-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white">
                            <option value="" class="dark:bg-slate-800">Ziel wählen...</option>
                            <option value="CT" class="dark:bg-slate-800">CT</option>
                            <option value="Röntgen" class="dark:bg-slate-800">Röntgen</option>
                            <option value="Station" class="dark:bg-slate-800">Station</option>
                            <option value="OP" class="dark:bg-slate-800">OP</option>
                            <option value="Herzkatheter" class="dark:bg-slate-800">Herzkatheter</option>
                        </select>
                        <input type="time" id="transTime" class="w-26 text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none text-center dark:bg-slate-900/60 dark:border-white/10 dark:text-white">
                    </div>
                    <button onclick="addTransport()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white dark:bg-indigo-500/20 dark:hover:bg-indigo-500/40 dark:border dark:border-indigo-400/50 dark:text-indigo-300 dark:hover:text-white text-sm py-2.5 rounded-lg transition font-medium shadow-sm dark:shadow-[0_0_10px_rgba(99,102,241,0.2)]"><i class="fa-solid fa-truck-medical mr-2"></i> Transport anlegen</button>
                </div>

                <div id="transportList" class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar">
                    <!-- Transports injected here -->
                </div>
            </div>
        </div>

        <!-- Column 3: Vitals Dropzone -->
        <div class="flex flex-col gap-4 h-full lg:col-span-1">
            <div class="glass-panel rounded-2xl flex flex-col max-h-full bg-white/70 border border-slate-200 dark:bg-slate-800/40 dark:border-white/10">
                <div class="p-4 border-b border-slate-200 dark:border-white/10 flex justify-between items-center">
                    <h2 class="font-semibold flex items-center gap-2 text-slate-800 dark:text-white">
                        <i class="fa-solid fa-heartbeat text-pink-500"></i> Vital Zwischenablage
                    </h2>
                </div>
                
                <div class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar">
                    <div>
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">Patienten Info optional</label>
                        <input type="text" id="vitPatient" placeholder="Name oder Raum" class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">RR mmHg</label>
                            <input type="text" id="vitRR" placeholder="120/80" class="w-full text-lg font-mono p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-center text-helios-600 dark:text-helios-400 dark:bg-slate-900/60 dark:border-white/10 transition">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">HF /min</label>
                            <input type="number" id="vitHF" placeholder="80" class="w-full text-lg font-mono p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-center text-helios-600 dark:text-helios-400 dark:bg-slate-900/60 dark:border-white/10 transition">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">SpO2 %</label>
                            <input type="number" id="vitSpO2" placeholder="98" class="w-full text-lg font-mono p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-center text-helios-600 dark:text-helios-400 dark:bg-slate-900/60 dark:border-white/10 transition">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">Temp °C</label>
                            <input type="number" step="0.1" id="vitTemp" placeholder="37.0" class="w-full text-lg font-mono p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none text-center text-helios-600 dark:text-helios-400 dark:bg-slate-900/60 dark:border-white/10 transition">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 block">GCS / BZ / Sonstiges</label>
                        <input type="text" id="vitMisc" placeholder="BZ 120, GCS 15..." class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white transition">
                    </div>
                    
                    <div class="pt-2 flex gap-2">
                        <button onclick="copyVitals()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white dark:bg-white/10 dark:hover:bg-white/20 dark:border dark:border-white/20 py-2.5 rounded-lg transition font-medium text-sm flex justify-center items-center gap-2 shadow-sm">
                            <i class="fa-regular fa-copy"></i> In Ablage kopieren
                        </button>
                        <button onclick="clearVitals()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 dark:bg-red-500/10 dark:hover:bg-red-500/20 dark:border dark:border-red-500/30 dark:text-red-400 px-4 py-2.5 rounded-lg transition">
                            <i class="fa-solid fa-eraser"></i>
                        </button>
                    </div>
                    <div id="copyToast" class="hidden text-center text-xs font-medium text-helios-600 bg-helios-100 border border-helios-200 dark:text-helios-400 dark:bg-helios-500/10 dark:border-helios-500/20 p-2 rounded-lg mt-2">Kopiert für Orbis!</div>
                </div>
            </div>
        </div>

        <!-- Column 4: Task List (Formerly Brain Dump) -->
        <div class="flex flex-col gap-4 h-full lg:col-span-1">
            <div class="glass-panel rounded-2xl flex flex-col h-full bg-white/70 border border-slate-200 dark:bg-slate-800/40 dark:border-white/10">
                <div class="p-4 border-b border-slate-200 dark:border-white/10 flex justify-between items-center">
                    <h2 class="font-semibold flex items-center gap-2 text-slate-800 dark:text-white">
                        <i class="fa-solid fa-list-check text-amber-500 dark:text-amber-400"></i> Checkliste
                    </h2>
                    <span class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest bg-slate-200 dark:bg-white/5 px-2 py-1 rounded">Auto Save</span>
                </div>
                <div class="p-4 flex-1 flex flex-col overflow-hidden">
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newTaskInput" placeholder="Neue Aufgabe..." class="w-full text-sm p-2.5 rounded-lg bg-white border border-slate-200 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none dark:bg-slate-900/60 dark:border-white/10 dark:text-white transition" onkeypress="if(event.key === 'Enter') addTask()">
                        <button onclick="addTask()" class="bg-amber-500 hover:bg-amber-600 text-white dark:bg-amber-500/30 dark:hover:bg-amber-500/50 dark:border dark:border-amber-500/50 px-4 rounded-lg transition shadow-sm"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="taskList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                        <!-- Tasks injected here -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // State Management
        let appData = {
            timers: [],
            transports: [],
            tasks: [] // Changed from notes to tasks
        };

        // Theme Toggle Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Init & Loop
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            startClock();
            setInterval(updateTimersLogic, 1000);
        });

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('de-DE');
                document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }, 1000);
        }

        // Data Persistence
        function saveData() {
            localStorage.setItem('erTaskRadar', JSON.stringify(appData));
        }

        function loadData() {
            const saved = localStorage.getItem('erTaskRadar');
            if (saved) {
                const parsed = JSON.parse(saved);
                appData.timers = parsed.timers || [];
                appData.transports = parsed.transports || [];
                
                // Migration: if old 'notes' exist but no 'tasks', convert notes to a single task just in case
                if (parsed.notes && (!parsed.tasks || parsed.tasks.length === 0)) {
                    appData.tasks = [{ id: Date.now(), text: parsed.notes, done: false }];
                } else {
                    appData.tasks = parsed.tasks || [];
                }

                renderTimers();
                renderTransports();
                renderTasks();
            }
        }

        function clearAllData() {
            if(confirm('Achtung: Willst du wirklich alle Daten dieser Schicht löschen?')) {
                appData = { timers: [], transports: [], tasks: [] };
                clearVitals();
                saveData();
                renderTimers();
                renderTransports();
                renderTasks();
            }
        }

        // Feature: Timers
        function addTimer(minutes) {
            const patient = document.getElementById('timerPatient').value || "Unbekannt";
            const task = document.getElementById('timerTask').value || "Labor / Warten";
            
            const newTimer = {
                id: Date.now(),
                patient: patient,
                task: task,
                startTime: Date.now(),
                durationMs: minutes * 60 * 1000,
                isOverdue: false
            };
            
            appData.timers.push(newTimer);
            saveData();
            renderTimers();
            
            document.getElementById('timerPatient').value = "";
            document.getElementById('timerTask').value = "";
            document.getElementById('timerPatient').focus();
        }

        function addCustomTimer() {
            const mins = parseInt(document.getElementById('timerCustom').value);
            if(mins > 0) {
                addTimer(mins);
                document.getElementById('timerCustom').value = "";
            }
        }

        function deleteTimer(id) {
            appData.timers = appData.timers.filter(t => t.id !== id);
            saveData();
            renderTimers();
        }

        function updateTimersLogic() {
            let needsRender = false;
            const now = Date.now();
            
            appData.timers.forEach(timer => {
                const elapsed = now - timer.startTime;
                const wasOverdue = timer.isOverdue;
                timer.isOverdue = elapsed >= timer.durationMs;
                
                if (timer.isOverdue !== wasOverdue) {
                    needsRender = true;
                    saveData();
                }
            });
            
            if (needsRender) {
                renderTimers();
            } else {
                updateTimerDisplays(now);
            }
        }

        function formatTimeDiff(ms) {
            const totalSeconds = Math.floor(Math.abs(ms) / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function renderTimers() {
            const list = document.getElementById('timerList');
            list.innerHTML = '';
            
            if(appData.timers.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-500 text-sm py-8 font-mono">Keine aktiven Timer</div>';
                return;
            }

            const sortedTimers = [...appData.timers].sort((a, b) => {
                if (a.isOverdue && !b.isOverdue) return -1;
                if (!a.isOverdue && b.isOverdue) return 1;
                const aRemaining = a.durationMs - (Date.now() - a.startTime);
                const bRemaining = b.durationMs - (Date.now() - b.startTime);
                return aRemaining - bRemaining;
            });

            sortedTimers.forEach(timer => {
                const el = document.createElement('div');
                
                // Styling Logic based on state and theme
                const baseClasses = "p-4 rounded-xl relative transition-all duration-300 border overflow-hidden shadow-sm";
                const stateClasses = timer.isOverdue 
                    ? "bg-red-50 border-red-300 dark:bg-red-900/20 dark:border-red-500/50 animate-pulse-red-glow" 
                    : "bg-white border-slate-200 dark:bg-white/5 dark:border-helios-400/30 dark:animate-pulse-glow";
                
                el.className = `${baseClasses} ${stateClasses}`;
                
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-2 relative z-10">
                        <div>
                            <div class="font-bold text-sm text-slate-800 dark:text-white">${timer.patient}</div>
                            <div class="text-xs text-slate-500 dark:text-slate-300 mt-0.5">${timer.task}</div>
                        </div>
                        <button onclick="deleteTimer(${timer.id})" class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-white/10"><i class="fa-solid fa-times"></i></button>
                    </div>
                    
                    <div class="flex justify-between items-end mt-4 relative z-10">
                        <div class="text-xs font-mono px-2 py-1 rounded bg-slate-100 text-slate-600 dark:bg-black/30 dark:text-slate-300 dark:border dark:border-white/10">
                            Ziel: ${timer.durationMs / 60000}m
                        </div>
                        <div class="font-mono font-bold text-2xl tracking-wider timer-display ${timer.isOverdue ? 'text-red-600 dark:text-red-400 dark:text-glow-red' : 'text-helios-600 dark:text-helios-400 dark:text-glow-green'}" data-id="${timer.id}">
                            --:--
                        </div>
                    </div>
                    
                    ${!timer.isOverdue ? `
                    <div class="absolute bottom-0 left-0 h-1 bg-slate-100 dark:bg-helios-500/20 w-full">
                        <div class="bg-helios-500 dark:bg-helios-400 h-full progress-bar dark:shadow-[0_0_10px_rgba(16,185,129,0.8)] transition-all duration-1000 ease-linear" data-id="${timer.id}"></div>
                    </div>` : `
                    <div class="absolute bottom-0 left-0 h-1 bg-red-500 w-full dark:shadow-[0_0_15px_rgba(239,68,68,1)]"></div>
                    `}
                `;
                list.appendChild(el);
            });
            updateTimerDisplays(Date.now());
        }

        function updateTimerDisplays(now) {
            appData.timers.forEach(timer => {
                const display = document.querySelector(`.timer-display[data-id="${timer.id}"]`);
                const progress = document.querySelector(`.progress-bar[data-id="${timer.id}"]`);
                
                if(display) {
                    const elapsed = now - timer.startTime;
                    const diff = timer.durationMs - elapsed;
                    
                    if(diff <= 0) {
                        display.innerText = "+" + formatTimeDiff(Math.abs(diff));
                    } else {
                        display.innerText = formatTimeDiff(diff);
                        if(progress) {
                            const percent = (elapsed / timer.durationMs) * 100;
                            progress.style.width = `${percent}%`;
                        }
                    }
                }
            });
        }

        // Feature: Transports
        function addTransport() {
            const patient = document.getElementById('transPatient').value;
            const ziel = document.getElementById('transZiel').value;
            const time = document.getElementById('transTime').value;

            if(!patient || !ziel) {
                alert("Patient und Ziel müssen ausgefüllt sein.");
                return;
            }

            const newTrans = {
                id: Date.now(),
                patient: patient,
                ziel: ziel,
                time: time || "ASAP",
                status: "waiting" 
            };

            appData.transports.push(newTrans);
            saveData();
            renderTransports();
            
            document.getElementById('transPatient').value = "";
            document.getElementById('transZiel').value = "";
            document.getElementById('transTime').value = "";
        }

        function updateTransportStatus(id, newStatus) {
            const t = appData.transports.find(x => x.id === id);
            if(t) {
                t.status = newStatus;
                saveData();
                renderTransports();
            }
        }

        function deleteTransport(id) {
            appData.transports = appData.transports.filter(t => t.id !== id);
            saveData();
            renderTransports();
        }

        function renderTransports() {
            const list = document.getElementById('transportList');
            list.innerHTML = '';
            
            if(appData.transports.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-500 text-sm py-8 font-mono">Keine Transporte disponiert</div>';
                return;
            }

            appData.transports.forEach(t => {
                let statusColor = "bg-white border-slate-200 text-slate-700 dark:bg-white/5 dark:border-white/10 dark:text-slate-300";
                let badgeColor = "bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-white/10";
                
                if(t.status === 'progress') { 
                    statusColor = "bg-amber-50 border-amber-200 text-amber-800 dark:bg-amber-500/10 dark:border-amber-500/30 dark:text-amber-100 dark:shadow-[0_0_15px_rgba(245,158,11,0.1)]"; 
                    badgeColor = "bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-500/20 dark:text-amber-300 dark:border-amber-500/50";
                }
                if(t.status === 'done') { 
                    statusColor = "bg-helios-50 border-helios-200 text-helios-800 opacity-70 dark:bg-helios-500/10 dark:border-helios-500/30 dark:text-helios-100 dark:opacity-60"; 
                    badgeColor = "bg-helios-100 text-helios-700 border-helios-200 dark:bg-helios-500/20 dark:text-helios-300 dark:border-helios-500/50";
                }

                const el = document.createElement('div');
                el.className = `p-3 rounded-xl border flex flex-col gap-3 transition-all duration-300 shadow-sm ${statusColor}`;
                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="font-bold text-sm text-slate-800 dark:text-white">${t.patient}</div>
                        <div class="font-mono text-xs font-bold px-2 py-0.5 rounded border ${badgeColor}">${t.time}</div>
                    </div>
                    <div class="text-sm font-medium opacity-80"><i class="fa-solid fa-location-dot mr-1.5"></i> ${t.ziel}</div>
                    
                    <div class="flex justify-between items-center mt-1 pt-3 border-t border-black/5 dark:border-white/10">
                        <div class="flex gap-1">
                            ${t.status !== 'waiting' ? `<button onclick="updateTransportStatus(${t.id}, 'waiting')" class="text-xs w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 border border-slate-200 text-slate-500 dark:bg-black/20 dark:hover:bg-slate-700 dark:border-white/10 dark:text-slate-400 transition" title="Wartet"><i class="fa-regular fa-clock"></i></button>` : ''}
                            ${t.status !== 'progress' ? `<button onclick="updateTransportStatus(${t.id}, 'progress')" class="text-xs w-8 h-8 rounded-lg bg-amber-100 hover:bg-amber-200 border border-amber-200 text-amber-600 dark:bg-amber-500/10 dark:hover:bg-amber-500/20 dark:border-amber-500/30 dark:text-amber-400 transition" title="Unterwegs"><i class="fa-solid fa-person-walking-arrow-right"></i></button>` : ''}
                            ${t.status !== 'done' ? `<button onclick="updateTransportStatus(${t.id}, 'done')" class="text-xs w-8 h-8 rounded-lg bg-helios-100 hover:bg-helios-200 border border-helios-200 text-helios-600 dark:bg-helios-500/10 dark:hover:bg-helios-500/20 dark:border-helios-500/30 dark:text-helios-400 transition" title="Erledigt"><i class="fa-solid fa-check"></i></button>` : ''}
                        </div>
                        <button onclick="deleteTransport(${t.id})" class="text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        // Feature: Vitals
        function copyVitals() {
            const pat = document.getElementById('vitPatient').value;
            const rr = document.getElementById('vitRR').value;
            const hf = document.getElementById('vitHF').value;
            const spo2 = document.getElementById('vitSpO2').value;
            const temp = document.getElementById('vitTemp').value;
            const misc = document.getElementById('vitMisc').value;

            let text = "VITALWERTE:\n";
            if(pat) text += `Patient: ${pat}\n`;
            if(rr) text += `RR: ${rr} mmHg\n`;
            if(hf) text += `HF: ${hf} /min\n`;
            if(spo2) text += `SpO2: ${spo2} %\n`;
            if(temp) text += `Temp: ${temp} °C\n`;
            if(misc) text += `Zusatz: ${misc}\n`;
            text += `Erfasst um: ${new Date().toLocaleTimeString('de-DE').substring(0,5)} Uhr`;

            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const toast = document.getElementById('copyToast');
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 2000);
                } catch (err) {
                    console.error('Fallback failed', err);
                }
                document.body.removeChild(textArea);
            });
        }

        function clearVitals() {
            document.getElementById('vitPatient').value = '';
            document.getElementById('vitRR').value = '';
            document.getElementById('vitHF').value = '';
            document.getElementById('vitSpO2').value = '';
            document.getElementById('vitTemp').value = '';
            document.getElementById('vitMisc').value = '';
        }

        // Feature: Task List (Checklist)
        function addTask() {
            const input = document.getElementById('newTaskInput');
            const text = input.value.trim();
            if(!text) return;

            appData.tasks.unshift({
                id: Date.now(),
                text: text,
                done: false
            });

            input.value = '';
            saveData();
            renderTasks();
        }

        function toggleTask(id) {
            const task = appData.tasks.find(t => t.id === id);
            if(task) {
                task.done = !task.done;
                saveData();
                renderTasks();
            }
        }

        function deleteTask(id) {
            appData.tasks = appData.tasks.filter(t => t.id !== id);
            saveData();
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            if(appData.tasks.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 dark:text-slate-500 text-sm py-4 font-mono">Keine Aufgaben</div>';
                return;
            }

            // Sort so unchecked are at the top
            const sortedTasks = [...appData.tasks].sort((a, b) => {
                if(a.done === b.done) return b.id - a.id; // newest first
                return a.done ? 1 : -1;
            });

            sortedTasks.forEach(task => {
                const el = document.createElement('div');
                const textStyle = task.done 
                    ? "line-through text-slate-400 dark:text-slate-500" 
                    : "text-slate-700 dark:text-slate-200";
                const bgStyle = task.done 
                    ? "bg-slate-50/50 dark:bg-white/5 opacity-70 border-transparent" 
                    : "bg-white dark:bg-slate-900/40 border-slate-200 dark:border-white/10 shadow-sm";
                const checkIcon = task.done 
                    ? "<i class='fa-solid fa-circle-check text-helios-500 dark:text-helios-400'></i>" 
                    : "<i class='fa-regular fa-circle text-slate-300 dark:text-slate-500'></i>";

                el.className = `flex items-center gap-3 p-3 rounded-lg border transition-all duration-200 ${bgStyle}`;
                el.innerHTML = `
                    <button onclick="toggleTask(${task.id})" class="text-xl flex-shrink-0 hover:scale-110 transition-transform">
                        ${checkIcon}
                    </button>
                    <span class="flex-1 text-sm ${textStyle} transition-all">${task.text}</span>
                    <button onclick="deleteTask(${task.id})" class="text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 flex-shrink-0 transition-colors">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                list.appendChild(el);
            });
        }

    </script>
</body>
</html>
